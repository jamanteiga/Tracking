<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Octavia Telemetry PRO</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' }</script>
    <style>
        #map { 
            height: 300px !important; 
            width: 100% !important; 
            border-radius: 1rem; 
            background: #27272a; 
            border: 2px solid #3f3f46;
        }
        .hidden { display: none !important; }
        .dashboard-val { font-family: ui-monospace, monospace; font-weight: 800; }
        @keyframes pulse-red { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        .animate-rec { animation: pulse-red 1s infinite; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-white min-h-screen transition-colors duration-500">
    
    <header class="p-4 flex justify-between items-center bg-white dark:bg-slate-900 border-b dark:border-slate-800 shadow-sm">
        <h1 class="font-black text-xl tracking-tighter italic text-blue-600 dark:text-blue-400">OCTAVIA LOG</h1>
        <button onclick="toggleModo()" id="btnModo" class="p-2 bg-slate-100 dark:bg-slate-800 rounded-xl border dark:border-slate-700">🌙</button>
    </header>

    <div id="pantalla1" class="p-6 max-w-md mx-auto space-y-4">
        <div class="space-y-2">
            <label class="text-[10px] font-bold uppercase opacity-60 ml-2">Ruta de Viaje</label>
            <input type="text" id="origen" class="w-full p-4 bg-white dark:bg-slate-800 border dark:border-slate-700 rounded-2xl shadow-sm" placeholder="Origen">
            <input type="text" id="destino" class="w-full p-4 bg-white dark:bg-slate-800 border dark:border-slate-700 rounded-2xl shadow-sm" placeholder="Destino">
        </div>

        <button onclick="conectarOBD()" id="btnConectar" class="w-full bg-slate-900 dark:bg-slate-100 dark:text-slate-900 text-white p-4 rounded-2xl font-bold flex justify-between items-center shadow-lg active:scale-95 transition-all">
            <span>VLINKER OBD2</span>
            <div id="dotConexion" class="h-3 w-3 bg-red-500 rounded-full border-2 border-white dark:border-slate-900"></div>
        </button>
        
        <button onclick="iniciarRuta()" id="btnTrazar" class="w-full bg-blue-600 text-white p-5 rounded-2xl font-black text-lg shadow-xl hover:bg-blue-700 transition-colors">
            TRAZAR E INICIAR
        </button>
    </div>

    <div id="pantalla2" class="hidden p-4 max-w-md mx-auto space-y-4">
        <div class="flex justify-between items-center bg-white dark:bg-slate-900 p-3 rounded-2xl border dark:border-slate-800 shadow-sm">
            <div class="flex items-center gap-3">
                <div id="dotRec" class="h-3 w-3 bg-slate-400 rounded-full"></div>
                <span id="labelRec" class="text-[10px] font-black uppercase tracking-widest opacity-50">Datalogger Ready</span>
            </div>
            <button id="btnStartRec" onclick="alternarGrabacion()" class="bg-red-600 text-white px-5 py-2 rounded-xl text-[10px] font-black uppercase shadow-md active:scale-90 transition-all">Iniciar REC</button>
        </div>

        <div class="relative">
            <div id="map"></div>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <div class="bg-white dark:bg-slate-900 p-5 rounded-3xl border dark:border-slate-800 shadow-sm text-center">
                <p class="text-[10px] font-bold opacity-40 uppercase mb-1">Altitud</p>
                <p class="text-3xl dashboard-val"><span id="valAltitud">0</span><span class="text-sm ml-1 opacity-50">m</span></p>
            </div>
            <div class="bg-white dark:bg-slate-900 p-5 rounded-3xl border dark:border-slate-800 shadow-sm text-center">
                <p class="text-[10px] font-bold opacity-40 uppercase mb-1">Llegada</p>
                <p id="valLlegada" class="text-3xl dashboard-val text-blue-600">--:--</p>
            </div>
            <div class="col-span-2 bg-slate-900 dark:bg-blue-600 p-6 rounded-[2.5rem] text-white flex justify-between items-center shadow-2xl overflow-hidden relative">
                <div class="relative z-10">
                    <p class="text-[10px] opacity-60 uppercase font-black mb-1">Velocidad Real</p>
                    <p class="text-6xl dashboard-val tracking-tighter"><span id="valVelocidad">0</span><span class="text-xl ml-2 opacity-50 font-light italic">km/h</span></p>
                </div>
                <button onclick="finalizarViaje()" class="relative z-10 bg-white/20 p-5 rounded-full text-white font-bold backdrop-blur-md active:scale-90 transition-all">SALIR</button>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="app.js"></script>
</body>
</html>
