<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tracking</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .dashboard-val { font-family: 'Courier New', monospace; }
        .transition-all { transition: all 0.3s ease; }
    </style>
</head>
<body id="bodyApp" class="bg-white text-slate-900 transition-all duration-500">

    <header class="p-4 flex justify-between items-center border-b border-slate-200 dark:border-slate-700">
        <h1 class="font-bold text-lg">Tracking</h1>
        <button onclick="toggleModo()" id="btnModo" class="p-2 rounded-full bg-slate-100 dark:bg-slate-800 text-xl">🌙</button>
    </header>

    <div id="pantalla1" class="p-6 max-w-md mx-auto">
        <div class="space-y-4">
            <div class="space-y-3">
                <input type="text" id="origen" class="w-full p-3 bg-slate-50 dark:bg-slate-800 border rounded-lg" placeholder="Origen: Calle, Parroquia, Ayuntamiento">
                <input type="text" id="destino" class="w-full p-3 bg-slate-50 dark:bg-slate-800 border rounded-lg" placeholder="Destino: Calle, Ayuntamiento">
            </div>

            <div class="pt-2">
                <label class="block text-xs font-bold text-blue-600 mb-1">Precio Gasolina (€/L)</label>
                <input type="number" id="precioLitro" step="0.001" class="w-full p-3 bg-blue-50 dark:bg-slate-800 border border-blue-100 rounded-lg font-bold" value="1.650">
            </div>

            <div class="grid grid-cols-1 gap-3 pt-4">
                <button onclick="conectarOBD()" id="btnConectar" class="w-full bg-slate-700 text-white p-4 rounded-xl font-bold flex justify-between items-center">
                    <span>1. CONECTAR VLINKER</span>
                    <span id="dotConexion" class="h-3 w-3 bg-red-500 rounded-full"></span>
                </button>
                
                <button onclick="iniciarRuta()" class="w-full bg-blue-600 text-white p-4 rounded-xl font-bold text-lg shadow-lg shadow-blue-200 dark:shadow-none">
                    2. TRAZAR RUTA Y SALIR
                </button>
            </div>
        </div>
    </div>

    <div id="pantalla2" class="hidden flex flex-col h-[calc(100vh-80px)] p-4">
        </div>

    <script src="app.js"></script>
</body>
</html>
