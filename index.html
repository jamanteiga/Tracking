<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tracking</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' }</script>
</head>
<body class="bg-white dark:bg-slate-900 text-slate-900 dark:text-white transition-colors">
    
    <header class="p-4 flex justify-between items-center border-b dark:border-slate-700">
        <h1 class="font-bold">Tracking</h1>
        <button onclick="toggleModo()" id="btnModo" class="p-2 bg-slate-100 dark:bg-slate-800 rounded-full">🌙</button>
    </header>

    <div id="pantalla1" class="p-6 space-y-4">
        <input type="text" id="origen" class="w-full p-4 border rounded-xl dark:bg-slate-800" placeholder="Origen">
        <input type="text" id="destino" class="w-full p-4 border rounded-xl dark:bg-slate-800" placeholder="Destino">
        <input type="number" id="precioLitro" class="w-full p-4 border rounded-xl text-center font-bold dark:bg-slate-800" value="1.488">
        
        <button onclick="conectarOBD()" id="btnConectar" class="w-full bg-slate-800 text-white p-4 rounded-xl font-bold flex justify-between items-center">
            <span>CONECTAR</span>
            <span id="dotConexion" class="h-3 w-3 bg-red-500 rounded-full"></span>
        </button>
        
        <button onclick="iniciarRuta()" class="w-full bg-blue-600 text-white p-5 rounded-xl font-black">
            TRAZAR RUTA
        </button>
    </div>

    <div id="pantalla2" style="display:none" class="p-4 space-y-4">
        <div class="flex justify-between items-center">
            <span class="text-xs font-bold">OBD ACTIVO</span>
            <button onclick="finalizarViaje()" class="text-xs font-bold text-red-500 p-2">✕ FINALIZAR</button>
        </div>
        <div class="bg-slate-100 dark:bg-slate-800 p-6 rounded-xl border dark:border-slate-700 text-center">
            <p id="indicadorRuta" class="font-bold uppercase"></p>
        </div>
        <div class="grid grid-cols-2 gap-4 text-center">
            <div class="bg-slate-50 dark:bg-slate-800 p-4 rounded-xl border dark:border-slate-700">
                <p class="text-xs opacity-50">Llegada</p>
                <p id="valLlegada" class="text-2xl font-bold text-blue-600">--:--</p>
            </div>
            <div class="bg-slate-50 dark:bg-slate-800 p-4 rounded-xl border dark:border-slate-700">
                <p class="text-xs opacity-50">Velocidad</p>
                <p class="text-2xl font-bold">0</p>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
