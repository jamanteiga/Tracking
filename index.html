<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tracking Pro</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' }</script>
    <style>
        #map { height: 250px; width: 100%; z-index: 10; background: #eee; }
        .hidden { display: none !important; }
    </style>
</head>
<body class="bg-white dark:bg-slate-900 text-slate-900 dark:text-white min-h-screen">
    
    <header class="p-4 flex justify-between items-center border-b dark:border-slate-700">
        <h1 class="font-bold text-xl">Tracking</h1>
        <button onclick="toggleModo()" id="btnModo" class="p-2 bg-slate-100 dark:bg-slate-800 rounded-full">🌙</button>
    </header>

    <div id="pantalla1" class="p-6 max-w-md mx-auto space-y-4">
        <input type="text" id="origen" class="w-full p-4 bg-slate-50 dark:bg-slate-800 border dark:border-slate-700 rounded-xl" placeholder="Origen">
        <input type="text" id="destino" class="w-full p-4 bg-slate-50 dark:bg-slate-800 border dark:border-slate-700 rounded-xl" placeholder="Destino">
        <input type="number" id="precioLitro" step="0.001" class="w-full p-4 border rounded-xl text-center font-bold" value="1.488">
        <button onclick="iniciarRuta()" id="btnTrazar" class="w-full bg-blue-600 text-white p-5 rounded-xl font-black">TRAZAR RUTA</button>
    </div>

    <div id="pantalla2" class="hidden p-4 max-w-md mx-auto space-y-4">
        <div class="flex justify-between items-center">
            <span class="text-xs font-bold uppercase">Trayecto Real</span>
            <button onclick="finalizarViaje()" class="text-xs font-bold text-red-500 uppercase">✕ Salir</button>
        </div>

        <div class="bg-slate-100 dark:bg-slate-800 rounded-3xl p-4 border dark:border-slate-700">
            <div id="map" class="rounded-2xl"></div>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <div class="bg-slate-50 dark:bg-slate-800 p-4 rounded-2xl border dark:border-slate-700 text-center">
                <p class="text-[10px] uppercase font-bold opacity-50">Llegada</p>
                <p id="valLlegada" class="text-3xl font-mono text-blue-600">--:--</p>
            </div>
            <div class="bg-slate-50 dark:bg-slate-800 p-4 rounded-2xl border dark:border-slate-700 text-center">
                <p class="text-[10px] uppercase font-bold opacity-50">Velocidad</p>
                <p id="valVelocidad" class="text-3xl font-mono">0</p>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="app.js"></script>
</body>
</html>
