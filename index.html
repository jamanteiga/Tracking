<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tracking</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Tracking">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class', // Habilita el modo oscuro por clase
        }
    </script>
    
    <style>
        .dashboard-val { font-family: 'Courier New', monospace; font-weight: bold; }
        .transition-all { transition: all 0.3s ease; }
        /* Evita el scroll elástico en iOS */
        body { overscroll-behavior-y: contain; }
    </style>
</head>
<body id="bodyApp" class="bg-white text-slate-900 transition-all duration-500 min-h-screen">

    <header class="p-4 flex justify-between items-center border-b border-slate-200 dark:border-slate-700 dark:bg-slate-900">
        <h1 class="font-bold text-xl tracking-tight dark:text-white">Tracking</h1>
        <button onclick="toggleModo()" id="btnModo" class="p-2 rounded-full bg-slate-100 dark:bg-slate-800 text-xl shadow-sm">
            🌙
        </button>
    </header>

    <div id="pantalla1" class="p-6 max-w-md mx-auto space-y-6">
        <div class="space-y-4">
            <div>
                <label class="block text-xs uppercase font-bold text-slate-500 mb-1 ml-1">Origen</label>
                <input type="text" id="origen" 
                    class="w-full p-4 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-2xl dark:text-white focus:ring-2 focus:ring-blue-500 outline-none" 
                    placeholder="Ej: Carballal 12, Abegondo">
            </div>
            <div>
                <label class="block text-xs uppercase font-bold text-slate-500 mb-1 ml-1">Destino</label>
                <input type="text" id="destino" 
                    class="w-full p-4 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-2xl dark:text-white focus:ring-2 focus:ring-blue-500 outline
