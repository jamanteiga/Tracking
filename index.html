<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Octavia Telemetry</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        #map { height: 350px; width: 100%; border-radius: 1rem; background: #2d3748; }
        .hidden { display: none !important; }
        .dashboard-val { font-family: ui-monospace, monospace; font-weight: 700; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-white min-h-screen">

    <div id="pantalla1" class="p-6 max-w-md mx-auto space-y-4">
        <div class="flex justify-between items-center">
            <h1 class="text-xl font-bold">Configuración</h1>
            <button onclick="conectarOBD()" id="btnConectar" class="text-xs bg-slate-200 dark:bg-slate-800 px-3 py-2 rounded-lg flex items-center gap-2">
                <div id="dotConexion" class="h-2 w-2 bg-red-500 rounded-full"></div>
                Conectar OBD
            </button>
        </div>

        <div class="space-y-3">
            <input type="text" id="origen" class="w-full p-3 rounded-xl border dark:bg-slate-900 dark:border-slate-700" placeholder="Origen">
            <input type="text" id="destino" class="w-full p-3 rounded-xl border dark:bg-slate-900 dark:border-slate-700" placeholder="Destino">
            <div class="flex items-center gap-2 p-3 bg-white dark:bg-slate-900 border rounded-xl">
                <span class="text-xs opacity-50 font-bold uppercase">€/L:</span>
                <input type="number" id="precioLitro" step="0.001" value="1.488" class="bg-transparent w-full font-bold">
            </div>
        </div>

        <button onclick="iniciarRuta()" class="w-full bg-blue-600 text-white p-4 rounded-xl font-bold shadow-lg">INICIAR TRAYECTO</button>
    </div>

    <div id="pantalla2" class="hidden p-4 max-w-md mx-auto space-y-4">
        <div id="map"></div>

        <div class="grid grid-cols-2 gap-3">
            <div class="col-span-2 bg-white dark:bg-slate-900 p-4 rounded-2xl shadow-sm border dark:border-slate-800 flex justify-between items-center">
                <div>
                    <p class="text-[10px] uppercase font-bold opacity-50">Velocidad</p>
                    <p class="text-4xl dashboard-val"><span id="valVelocidad">0</span><span class="text-lg"> km/h</span></p>
                </div>
                <button onclick="location.reload()" class="bg-slate-100 dark:bg-slate-800 p-2 rounded-lg text-xs">Finalizar</button>
            </div>
            
            <div class="bg-white dark:bg-slate-900 p-4 rounded-2xl border dark:border-slate-800">
                <p class="text-[10px] opacity-50 font-bold">MEDIA 10s</p>
                <p id="valMedia10s" class="text-xl dashboard-val">0</p>
            </div>
            <div class="bg-white dark:bg-slate-900 p-4 rounded-2xl border dark:border-slate-800">
                <p class="text-[10px] opacity-50 font-bold">COSTE €</p>
                <p id="valDinero" class="text-xl dashboard-val text-green-600">0.00</p>
            </div>
        </div>

        <button id="btnStartRec" onclick="alternarGrabacion()" class="w-full bg-red-600 text-white p-4 rounded-xl font-bold uppercase text-sm tracking-widest shadow-md">REC CSV (1s)</button>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="app.js"></script>
</body>
</html>
