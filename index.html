<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tracking</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Tracking">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .dashboard-val { font-family: 'Courier New', monospace; }
        .transition-all { transition: all 0.3s ease; }
    </style>
</head>
<body id="bodyApp" class="bg-white text-slate-900 transition-all duration-500">

    <header class="p-4 flex justify-between items-center border-b border-slate-200 dark:border-slate-700">
        <h1 class="font-bold text-lg">Tracking</h1>
        <button onclick="toggleModo()" id="btnModo" class="p-2 rounded-full bg-slate-100 dark:bg-slate-800 text-xl text-slate-900 dark:text-white">🌙</button>
    </header>

    <div id="pantalla1" class="p-6 max-w-md mx-auto">
        <div class="space-y-5">
            <div>
                <label class="block text-sm font-medium mb-1 text-slate-900 dark:text-white">Origen</label>
                <input type="text" id="origen" class="w-full p-3 bg-slate-50 dark:bg-slate-800 border rounded-lg text-slate-900 dark:text-white" placeholder="Calle, Parroquia, Ayuntamiento">
            </div>
            <div>
                <label class="block text-sm font-medium mb-1 text-slate-900 dark:text-white">Destino</label>
                <input type="text" id="destino" class="w-full p-3 bg-slate-50 dark:bg-slate-800 border rounded-lg text-slate-900 dark:text-white" placeholder="Calle, Ayuntamiento">
            </div>
            <div class="pt-4 border-t border-slate-200 dark:border-slate-700">
                <label class="block text-sm font-bold text-blue-600 dark:text-blue-400 mb-1">Precio Combustible (€/Litro)</label>
                <input type="number" id="precioLitro" step="0.001" class="w-full p-3 bg-blue-50 dark:bg-slate-800 border border-blue-200 dark:border-blue-900 rounded-lg font-bold text-slate-900 dark:text-white" value="1.650">
            </div>
            <button onclick="iniciarViaje()" class="w-full bg-blue-600 text-white p-4 rounded-xl font-bold text-lg shadow-lg active:scale-95 transition-transform">
                CONECTAR VLINKER Y SALIR
            </button>
        </div>
    </div>

    <div id="pantalla2" class="hidden flex flex-col h-[calc(100vh-80px)] p-4">
        <div class="flex justify-between items-center mb
