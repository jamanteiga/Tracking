<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Octavia PRO V26</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        #map { height: 300px; width: 100%; border-radius: 1rem; background: #cbd5e1; }
        .hidden { display: none !important; }
        .dashboard-val { font-family: ui-monospace, monospace; font-weight: 800; }
    </style>
</head>
<body class="bg-slate-900 text-white min-h-screen">

    <div id="pantalla1" class="p-6 max-w-md mx-auto space-y-4">
        <div class="flex justify-between items-center bg-slate-800 p-4 rounded-2xl">
            <span class="text-sm font-bold uppercase tracking-widest">Estado OBD</span>
            <button onclick="conectarOBD()" id="btnConectar" class="bg-blue-600 px-4 py-2 rounded-lg text-xs font-black active:scale-95">CONECTAR</button>
        </div>

        <div class="space-y-2">
            <input type="text" id="origen" class="w-full p-4 bg-slate-800 rounded-xl border-none text-white" placeholder="Origen">
            <input type="text" id="destino" class="w-full p-4 bg-slate-800 rounded-xl border-none text-white" placeholder="Destino">
            <input type="number" id="precioLitro" step="0.001" value="1.488" class="w-full p-4 bg-slate-800 rounded-xl border-none text-white font-bold">
        </div>

        <button onclick="iniciarRuta()" class="w-full bg-green-600 p-5 rounded-2xl font-black text-xl shadow-lg active:scale-95">TRAZAR RUTA</button>
    </div>

    <div id="pantalla2" class="hidden p-4 max-w-md mx-auto space-y-4">
        <div id="map"></div>

        <div class="grid grid-cols-2 gap-3">
            <div class="col-span-2 bg-slate-800 p-6 rounded-3xl flex justify-between items-center border border-slate-700">
                <div>
                    <p class="text-[10px] uppercase opacity-50">Velocidad</p>
                    <p class="text-5xl dashboard-val"><span id="valVelocidad">0</span> <span class="text-sm italic">km/h</span></p>
                </div>
                <div class="text-right">
                    <p class="text-[10px] uppercase opacity-50 font-bold">Llegada Est.</p>
                    <p id="valLlegada" class="text-2xl dashboard-val text-blue-400">--:--</p>
                </div>
            </div>
            
            <div class="bg-slate-800 p-4 rounded-2xl border border-slate-700">
                <p class="text-[10px] opacity-50 font-bold uppercase">Media 10s</p>
                <p id="valMedia10s" class="text-2xl dashboard-val text-orange-400">0</p>
            </div>
            <div class="bg-slate-800 p-4 rounded-2xl border border-slate-700">
                <p class="text-[10px] opacity-50 font-bold uppercase">Coste Viaje</p>
                <p class="text-2xl dashboard-val text-green-400"><span id="valDinero">0.00</span>€</p>
            </div>
        </div>

        <button id="btnStartRec" onclick="alternarGrabacion()" class="w-full bg-red-600 p-4 rounded-2xl font-black uppercase shadow-xl">INICIAR LOG CSV (1s)</button>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="app.js"></script>
</body>
</html>
