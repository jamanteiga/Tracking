<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Octavia Telemetry V22</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        #map { height: 350px !important; width: 100%; border-radius: 1.5rem; background: #eee; border: 2px solid #ddd; z-index: 10; }
        .dashboard-val { font-family: monospace; font-weight: 800; }
        .hidden { display: none !important; }
    </style>
</head>
<body class="bg-slate-100 text-slate-900 min-h-screen">
    
    <div id="pantalla1" class="p-6 max-w-md mx-auto space-y-4">
        <h1 class="text-2xl font-black italic text-blue-700">CONFIGURACIÓN VIAJE</h1>
        <input type="text" id="origen" class="w-full p-4 border rounded-2xl" placeholder="Origen (ej: Madrid)">
        <input type="text" id="destino" class="w-full p-4 border rounded-2xl" placeholder="Destino (ej: Valencia)">
        
        <div class="bg-white p-4 rounded-2xl border">
            <label class="block text-[10px] font-bold uppercase mb-2">Precio Combustible (€/L)</label>
            <input type="number" id="precioLitro" step="0.01" value="1.65" class="w-full p-2 bg-slate-50 rounded-lg border">
        </div>

        <button onclick="iniciarRuta()" class="w-full bg-blue-600 text-white p-5 rounded-2xl font-black text-xl shadow-lg">INICIAR TELEMETRÍA</button>
    </div>

    <div id="pantalla2" class="hidden p-4 max-w-md mx-auto space-y-4">
        <div id="map"></div>

        <div class="grid grid-cols-2 gap-3">
            <div class="col-span-2 bg-blue-600 p-6 rounded-[2rem] text-white flex justify-between items-center shadow-xl">
                <div>
                    <p class="text-[10px] uppercase font-bold opacity-80">Velocidad Real</p>
                    <p class="text-6xl dashboard-val"><span id="valVelocidad">0</span><span class="text-xl ml-1">km/h</span></p>
                </div>
                <button onclick="finalizarViaje()" class="bg-white/20 p-4 rounded-full font-bold">SALIR</button>
            </div>

            <div class="bg-white p-4 rounded-2xl border shadow-sm text-center">
                <p class="text-[10px] font-bold opacity-50 uppercase">V. Media (10s)</p>
                <p class="text-2xl dashboard-val text-orange-600"><span id="valMedia10s">0</span> <span class="text-xs">km/h</span></p>
            </div>

            <div class="bg-white p-4 rounded-2xl border shadow-sm text-center">
                <p class="text-[10px] font-bold opacity-50 uppercase">Altitud</p>
                <p class="text-2xl dashboard-val"><span id="valAltitud">0</span> <span class="text-xs">m</span></p>
            </div>

            <div class="bg-white p-4 rounded-2xl border shadow-sm text-center">
                <p class="text-[10px] font-bold opacity-50 uppercase">Consumo Med.</p>
                <p class="text-2xl dashboard-val text-green-700"><span id="valConsumo">5.5</span> <span class="text-xs">l/100</span></p>
            </div>

            <div class="bg-white p-4 rounded-2xl border shadow-sm text-center">
                <p class="text-[10px] font-bold opacity-50 uppercase">Coste Trayecto</p>
                <p class="text-2xl dashboard-val text-blue-700"><span id="valDinero">0.00</span> <span class="text-xs">€</span></p>
            </div>
        </div>

        <button id="btnStartRec" onclick="alternarGrabacion()" class="w-full bg-red-600 text-white p-4 rounded-2xl font-bold uppercase tracking-widest">INICIAR GRABACIÓN 1s</button>
        <p id="labelRec" class="text-center text-[10px] font-bold opacity-40 italic">ESPERANDO...</p>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="app.js"></script>
</body>
</html>
