<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Octavia Telemetry Pro</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* IMPORTANTE: Altura fija y fondo gris para saber si carga */
        #map { height: 300px !important; width: 100%; border-radius: 1rem; background: #555; z-index: 1; }
        .hidden { display: none !important; }
        .dashboard-val { font-family: monospace; font-weight: 800; }
    </style>
</head>
<body class="bg-slate-900 text-white min-h-screen">
    
    <div id="pantalla1" class="p-6 max-w-md mx-auto space-y-4">
        <h1 class="text-xl font-black text-blue-400 uppercase">Configuración de Viaje</h1>
        
        <button onclick="conectarOBD()" id="btnConectar" class="w-full bg-blue-600 p-5 rounded-2xl font-black flex justify-between items-center shadow-2xl border-2 border-blue-400 active:scale-95">
            <span>CONECTAR ADAPTADOR OBD</span>
            <div id="dotConexion" class="h-4 w-4 bg-red-500 rounded-full shadow-[0_0_10px_red]"></div>
        </button>

        <div class="space-y-2">
            <input type="text" id="origen" class="w-full p-4 bg-slate-800 border-slate-700 rounded-xl text-white" placeholder="Origen">
            <input type="text" id="destino" class="w-full p-4 bg-slate-800 border-slate-700 rounded-xl text-white" placeholder="Destino">
            <div class="flex items-center gap-2 p-2 bg-slate-800 rounded-xl">
                <span class="text-[10px] font-bold">€/L:</span>
                <input type="number" id="precioLitro" step="0.001" value="1.488" class="bg-transparent font-bold w-full">
            </div>
        </div>

        <button onclick="iniciarRuta()" class="w-full bg-green-600 text-white p-5 rounded-2xl font-black text-xl shadow-lg active:scale-95">TRAZAR Y ARRANCAR</button>
    </div>

    <div id="pantalla2" class="hidden p-4 max-w-md mx-auto space-y-4">
        <div id="map"></div>

        <div class="grid grid-cols-2 gap-3">
            <div class="col-span-2 bg-slate-800 p-5 rounded-3xl border border-slate-700 flex justify-between items-center">
                <div>
                    <p class="text-[10px] uppercase opacity-50">Velocidad Actual</p>
                    <p class="text-5xl dashboard-val"><span id="valVelocidad">0</span> <span class="text-sm">km/h</span></p>
                </div>
                <button onclick="finalizarViaje()" class="bg-red-600 p-3 rounded-xl font-bold text-xs text-white">SALIR</button>
            </div>

            <div class="bg-slate-800 p-4 rounded-2xl border border-slate-700 text-center">
                <p class="text-[10px] opacity-50 uppercase">V. Media (10s)</p>
                <p id="valMedia10s" class="text-2xl dashboard-val text-blue-400">0</p>
            </div>
            <div class="bg-slate-800 p-4 rounded-2xl border border-slate-700 text-center">
                <p class="text-[10px] opacity-50 uppercase">Coste (€)</p>
                <p id="valDinero" class="text-2xl dashboard-val text-green-400">0.00</p>
            </div>
        </div>

        <button id="btnStartRec" onclick="alternarGrabacion()" class="w-full bg-red-600 text-white p-4 rounded-2xl font-black uppercase">INICIAR GRABACIÓN CSV</button>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="app.js"></script>
</body>
</html>
